services:
  db2:
    image: icr.io/db2_community/db2
    container_name: b2bops-db2
    privileged: true
    environment:
      LICENSE: accept
      DB2INSTANCE: db2inst1
      DB2INST1_PASSWORD: password
      DBNAME: B2BOPS
      BLU: "false"
      ENABLE_ORACLE_COMPATIBILITY: "false"
      TO_CREATE_SAMPLEDB: "false"
      UPDATEAVAIL: "NO"
      REPODB: "false"
      IS_OSXFS: "false"
    ports:
      - "50000:50000"
    volumes:
      - db2data:/database

volumes:
  db2data:
