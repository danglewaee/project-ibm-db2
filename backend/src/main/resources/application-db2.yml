spring:
  datasource:
    url: ${DB2_URL:jdbc:db2://localhost:50000/B2BOPS}
    username: ${DB2_USERNAME:db2inst1}
    password: ${DB2_PASSWORD:password}
    driver-class-name: com.ibm.db2.jcc.DB2Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.DB2Dialect
        format_sql: true

app:
  runtime-mode: db2
  persistence-mode: jpa-db2
