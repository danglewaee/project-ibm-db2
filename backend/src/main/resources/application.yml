spring:
  application:
    name: b2bops-backend
  datasource:
    url: ${DB2_URL:jdbc:db2://localhost:50000/B2BOPS}
    username: ${DB2_USERNAME:db2inst1}
    password: ${DB2_PASSWORD:password}
    driver-class-name: com.ibm.db2.jcc.DB2Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.DB2Dialect
        format_sql: true
  sql:
    init:
      mode: never

server:
  shutdown: graceful

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

app:
  runtime-mode: stub
  ddl-path: ../db/db2-schema.sql
