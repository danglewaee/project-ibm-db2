spring:
  application:
    name: b2bops-backend
  profiles:
    default: local
  flyway:
    enabled: true
    baseline-on-migrate: true
    create-schemas: true
    default-schema: B2BOPS
    schemas: B2BOPS
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: B2BOPS
  sql:
    init:
      mode: never

server:
  shutdown: graceful

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

app:
  runtime-mode: ${APP_RUNTIME_MODE:jpa}
  persistence-mode: ${APP_PERSISTENCE_MODE:jpa-flyway}
  ddl-path: classpath:db/migration
