spring:
  datasource:
    # Keep H2 on its default uppercase identifier rules so Hibernate validation
    # can resolve the Flyway-managed schema the same way production dialects do.
    url: "jdbc:h2:mem:b2bops;MODE=DB2;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS B2BOPS\\;SET SCHEMA B2BOPS"
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    locations: ${APP_FLYWAY_LOCATIONS:${app.flyway-base-locations},${app.flyway-demo-locations}}
  h2:
    console:
      enabled: true
  jpa:
    properties:
      hibernate:
        format_sql: true

app:
  runtime-mode: local
  persistence-mode: jpa-flyway-h2
  flyway-base-locations: classpath:db/migration/h2
  flyway-demo-locations: classpath:db/migration/h2-demo
